<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Fake-3D tiled floor</title>
    <style>
      html, body { margin: 0; background: #222; color: #ccc; font-family: sans-serif; }
      #canvas { display: block; margin: 20px auto; background: #000; cursor: grab; }
      #canvas.dragging { cursor: grabbing; }
      #hint { text-align: center; }
    </style>
  </head>
  <body onload="init();">
    <canvas id="canvas" width="800" height="600">No ando</canvas>
    <p id="hint">Drag to orbit/tilt · Scroll to zoom</p>
    <script>
      var canvas, ctx;
      var tilePixels, tileW, tileH;
      var ready = false;

      // Camera state (all fake — used only to compute 4 screen corners)
      var cam = { yaw: 0, pitch: 0.9, dist: 3.0 };
      var PITCH_MIN = 0.15, PITCH_MAX = 1.4;
      var DIST_MIN = 1.2, DIST_MAX = 8;

      var RECT_W = 2.4, RECT_H = 1.6; // world-space size of the ground rectangle
      var REPEAT = 6; // how many tile copies across the rectangle
      var FOCAL = 500;

      var dragging = false, lastX = 0, lastY = 0;

      function init() {
        canvas = document.getElementById('canvas');
        ctx = canvas.getContext('2d');

        var img = new Image();
        img.onload = function () {
          var off = document.createElement('canvas');
          off.width = img.width;
          off.height = img.height;
          var octx = off.getContext('2d');
          octx.drawImage(img, 0, 0);
          tileW = img.width;
          tileH = img.height;
          tilePixels = octx.getImageData(0, 0, tileW, tileH).data;
          ready = true;
          render();
        };
        img.src = 'assets/tile.webp';

        canvas.addEventListener('mousedown', function (e) {
          dragging = true;
          lastX = e.clientX;
          lastY = e.clientY;
          canvas.classList.add('dragging');
        });
        window.addEventListener('mouseup', function () {
          dragging = false;
          canvas.classList.remove('dragging');
        });
        window.addEventListener('mousemove', function (e) {
          if (!dragging) return;
          var dx = e.clientX - lastX;
          var dy = e.clientY - lastY;
          lastX = e.clientX;
          lastY = e.clientY;

          cam.yaw += dx * 0.005;
          cam.pitch += dy * 0.004;
          if (cam.pitch < PITCH_MIN) cam.pitch = PITCH_MIN;
          if (cam.pitch > PITCH_MAX) cam.pitch = PITCH_MAX;

          render();
        });
        canvas.addEventListener('wheel', function (e) {
          e.preventDefault();
          var factor = e.deltaY > 0 ? 1.1 : 0.9;
          cam.dist *= factor;
          if (cam.dist < DIST_MIN) cam.dist = DIST_MIN;
          if (cam.dist > DIST_MAX) cam.dist = DIST_MAX;
          render();
        }, { passive: false });
      }

      // Rotate the rectangle's 4 ground-plane corners by yaw, tilt by pitch,
      // push back by dist, then pinhole-project to screen space.
      // This is the only place with any "3D-ish" math; everything after this
      // is pure 2D quad-fill.
      function projectCorners() {
        var hw = RECT_W / 2, hh = RECT_H / 2;
        var corners3d = [
          [-hw, 0, -hh],
          [hw, 0, -hh],
          [hw, 0, hh],
          [-hw, 0, hh]
        ];

        var cosY = Math.cos(cam.yaw), sinY = Math.sin(cam.yaw);
        var cosP = Math.cos(cam.pitch), sinP = Math.sin(cam.pitch);

        var cx = canvas.width / 2, cy = canvas.height / 2;
        var screen = [];

        for (var i = 0; i < 4; i++) {
          var p = corners3d[i];

          // yaw: rotate around vertical (Y) axis
          var x = p[0] * cosY - p[2] * sinY;
          var z0 = p[0] * sinY + p[2] * cosY;
          var y = p[1];

          // pitch: tilt the plane toward/away from camera, then move away by dist
          var y2 = y * cosP - z0 * sinP;
          var z = y * sinP + z0 * cosP + cam.dist;

          if (z < 0.05) z = 0.05; // guard against degenerate projection

          var sx = (FOCAL * x) / z + cx;
          var sy = (FOCAL * y2) / z + cy;
          screen.push([sx, sy]);
        }
        return screen;
      }

      // Solve the 8-parameter homography mapping unit-square corners
      // (0,0)(1,0)(1,1)(0,1) -> given screen quad corners.
      function computeHomography(dst) {
        var x0 = dst[0][0], y0 = dst[0][1];
        var x1 = dst[1][0], y1 = dst[1][1];
        var x2 = dst[2][0], y2 = dst[2][1];
        var x3 = dst[3][0], y3 = dst[3][1];

        // Standard unit-square-to-quad homography (see e.g. Heckbert's thesis).
        var dx1 = x1 - x2, dx2 = x3 - x2, dx3 = x0 - x1 + x2 - x3;
        var dy1 = y1 - y2, dy2 = y3 - y2, dy3 = y0 - y1 + y2 - y3;

        var g, h;
        if (Math.abs(dx3) < 1e-9 && Math.abs(dy3) < 1e-9) {
          g = 0;
          h = 0;
        } else {
          var den = dx1 * dy2 - dx2 * dy1;
          g = (dx3 * dy2 - dx2 * dy3) / den;
          h = (dx1 * dy3 - dx3 * dy1) / den;
        }

        var a = x1 - x0 + g * x1;
        var b = x3 - x0 + h * x3;
        var c = x0;
        var d = y1 - y0 + g * y1;
        var e = y3 - y0 + h * y3;
        var f = y0;

        // H maps (u,v,1) -> (x,y,w) with x = a*u+b*v+c*w etc, w = g*u+h*v+1
        return [a, b, c, d, e, f, g, h, 1];
      }

      // Invert the 3x3 homography so we can go screen(x,y) -> uv.
      function invertHomography(H) {
        var a = H[0], b = H[1], c = H[2];
        var d = H[3], e = H[4], f = H[5];
        var g = H[6], h = H[7], i = H[8];

        var A = e * i - f * h;
        var B = -(d * i - f * g);
        var C = d * h - e * g;
        var D = -(b * i - c * h);
        var E = a * i - c * g;
        var F = -(a * h - b * g);
        var G = b * f - c * e;
        var Hh = -(a * f - c * d);
        var I = a * e - b * d;

        var det = a * A + b * B + c * C;
        if (Math.abs(det) < 1e-12) return null;
        var inv = 1 / det;
        return [A * inv, D * inv, G * inv, B * inv, E * inv, Hh * inv, C * inv, F * inv, I * inv];
      }

      function render() {
        if (!ready) return;

        var screen = projectCorners();
        var H = computeHomography(screen);
        var Hinv = invertHomography(H);
        if (!Hinv) return;

        var W = canvas.width, Hh = canvas.height;
        var img = ctx.createImageData(W, Hh);
        var data = img.data;

        // Bounding box of the quad, clipped to canvas.
        var minX = W, maxX = 0, minY = Hh, maxY = 0;
        for (var k = 0; k < 4; k++) {
          minX = Math.min(minX, screen[k][0]);
          maxX = Math.max(maxX, screen[k][0]);
          minY = Math.min(minY, screen[k][1]);
          maxY = Math.max(maxY, screen[k][1]);
        }
        minX = Math.max(0, Math.floor(minX));
        maxX = Math.min(W - 1, Math.ceil(maxX));
        minY = Math.max(0, Math.floor(minY));
        maxY = Math.min(Hh - 1, Math.ceil(maxY));

        var a = Hinv[0], b = Hinv[1], c = Hinv[2];
        var d = Hinv[3], e = Hinv[4], f = Hinv[5];
        var g = Hinv[6], h = Hinv[7], iH = Hinv[8];

        for (var py = minY; py <= maxY; py++) {
          for (var px = minX; px <= maxX; px++) {
            var w = g * px + h * py + iH;
            if (Math.abs(w) < 1e-9) continue;
            var u = (a * px + b * py + c) / w;
            var v = (d * px + e * py + f) / w;

            if (u < 0 || u > 1 || v < 0 || v > 1) continue;

            var tx = ((u * REPEAT * tileW) | 0) % tileW;
            var ty = ((v * REPEAT * tileH) | 0) % tileH;
            if (tx < 0) tx += tileW;
            if (ty < 0) ty += tileH;

            var srcIdx = (ty * tileW + tx) * 4;
            var dstIdx = (py * W + px) * 4;
            data[dstIdx] = tilePixels[srcIdx];
            data[dstIdx + 1] = tilePixels[srcIdx + 1];
            data[dstIdx + 2] = tilePixels[srcIdx + 2];
            data[dstIdx + 3] = 255;
          }
        }

        ctx.putImageData(img, 0, 0);
      }
    </script>
  </body>
</html>
